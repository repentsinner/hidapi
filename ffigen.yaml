name: HidapiBindings
description: FFI bindings for hidapi
output: lib/src/hidapi_bindings.g.dart
# NOTE: ffigen requires a prior `dart run` to populate the build cache.
# The header lives under .dart_tool/ after the build hook downloads hidapi.
# To regenerate bindings, first run `dart run` then use the path below.
headers:
  entry-points:
    - .dart_tool/native_assets_builder/**/hidapi-hidapi-0.15.0/hidapi/hidapi.h
compiler-opts:
  - -DHID_API_NO_EXPORT_DEFINE
preamble: |
  // Generated by ffigen — do not edit.
  // ignore_for_file: type=lint
ffi-native:
  assetId: package:hidapi/src/hidapi_bindings.g.dart
functions:
  include:
    - hid_init
    - hid_exit
    - hid_enumerate
    - hid_free_enumeration
    - hid_open
    - hid_open_path
    - hid_close
    - hid_read
    - hid_read_timeout
    - hid_write
    - hid_send_feature_report
    - hid_get_feature_report
    - hid_set_nonblocking
    - hid_error
    - hid_get_device_info
    - hid_version
    - hid_version_str
structs:
  include:
    - hid_device_info
    - hid_api_version
enums:
  include:
    - hid_bus_type
typedefs:
  include:
    - hid_device
